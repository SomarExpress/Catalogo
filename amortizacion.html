<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Préstamos - Corregido</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
    --accent:#00d9a3;--accent2:#0ea5e9;--danger:#f85149;--warning:#e3b341;
    --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
    --paid:#1a3a2a;--paid-border:#238636;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
  .header-logo{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:16px;color:#000;}
  .header h1{font-size:18px;font-weight:600;letter-spacing:-0.3px;}
  .header span{color:var(--text2);font-size:13px;margin-left:8px;}

  .container{max-width:1400px;margin:0 auto;padding:32px;display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start;}

  .config-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;position:sticky;top:80px;}
  .panel-header{padding:16px 20px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);display:flex;align-items:center;gap:8px;}
  .panel-header::before{content:'';width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent);}

  .form-body{padding:20px;display:flex;flex-direction:column;gap:16px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
  .field input,.field select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:14px;padding:10px 12px;outline:none;transition:border-color .15s;width:100%;}
  .field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,217,163,.1);}
  .field select option{background:var(--surface2);}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 20px 20px;}
  .stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;}
  .stat-card.accent{border-color:var(--accent);background:rgba(0,217,163,.05);}
  .stat-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:4px;}
  .stat-value{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:var(--text);}
  .stat-card.accent .stat-value{color:var(--accent);}

  .btn-calcular{margin:0 20px 20px;padding:12px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;width:calc(100% - 40px);}
  .btn-calcular:hover{background:#00f5b8;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,217,163,.3);}

  .table-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .table-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);display:flex;align-items:center;gap:8px;}
  .table-title::before{content:'';width:8px;height:8px;background:var(--accent2);border-radius:50%;box-shadow:0 0 8px var(--accent2);}
  .progress-bar-wrap{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text2);}
  .progress-bar-outer{width:120px;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
  .progress-bar-inner{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease;}

  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  thead tr{border-bottom:2px solid var(--border);}
  th{padding:12px 16px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);white-space:nowrap;}
  th:not(:first-child){text-align:right;}
  th.actions-col{text-align:center;}

  tbody tr{border-bottom:1px solid rgba(48,54,61,.5);transition:background .1s;}
  tbody tr:hover{background:rgba(255,255,255,.02);}
  tbody tr.paid{background:var(--paid);border-bottom-color:rgba(35,134,54,.2);}
  tbody tr.paid:hover{background:rgba(35,134,54,.12);}

  td{padding:12px 16px;font-size:13px;text-align:right;white-space:nowrap;}
  td:first-child{text-align:left;}
  td.num{font-family:'IBM Plex Mono',monospace;font-size:12px;}

  .cuota-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--text2);}
  tr.paid .cuota-num{background:rgba(35,134,54,.2);border-color:var(--paid-border);color:var(--accent);}

  .fecha-cell{color:var(--text2);font-size:12px;}
  .fecha-pago-cell{color:var(--accent);font-size:11px;font-style:italic;}

  .badge-pagada{display:inline-flex;align-items:center;gap:4px;background:rgba(35,134,54,.2);border:1px solid var(--paid-border);border-radius:20px;padding:3px 8px;font-size:11px;font-weight:600;color:var(--accent);}

  .btn-pagar{padding:5px 12px;background:transparent;border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
  .btn-pagar:hover{background:var(--accent);color:#000;}
  .btn-reversar{padding:5px 12px;background:transparent;border:1px solid var(--text3);border-radius:6px;color:var(--text3);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;}
  .btn-reversar:hover{border-color:var(--danger);color:var(--danger);}
  .actions-col{text-align:center !important;}

  .balance-pendiente{color:var(--danger) !important;font-weight:600;}
  .balance-cero{color:var(--accent) !important;font-weight:600;}

  tfoot tr{border-top:2px solid var(--border);}
  tfoot td{padding:14px 16px;font-weight:700;font-family:'IBM Plex Mono',monospace;font-size:13px;}
  tfoot td:first-child{font-family:'DM Sans',sans-serif;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);}
  tfoot .total-capital{color:var(--accent2);}
  tfoot .total-intereses{color:var(--warning);}
  tfoot .total-cuota{color:var(--accent);}

  .empty-state{padding:60px 20px;text-align:center;color:var(--text3);}
  .empty-state .icon{font-size:48px;margin-bottom:16px;}
  .empty-state h3{font-size:16px;color:var(--text2);margin-bottom:8px;}

  .nota-acerca{padding:12px 20px;border-top:1px solid var(--border);background:rgba(0,0,0,.2);}
  .nota-acerca textarea{width:100%;background:transparent;border:none;outline:none;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;resize:none;height:40px;}
  
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:360px;max-width:95vw;}
  .modal h3{font-size:16px;font-weight:700;margin-bottom:4px;}
  .modal .modal-sub{font-size:12px;color:var(--text2);margin-bottom:20px;}
  .modal-resumen{background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:20px;display:flex;flex-direction:column;gap:6px;}
  .modal-resumen-row{display:flex;justify-content:space-between;font-size:13px;}
  .modal-resumen-row span:first-child{color:var(--text2);}
  .modal-resumen-row span:last-child{font-family:'IBM Plex Mono',monospace;font-weight:600;}
  .modal-resumen-row.total span:last-child{color:var(--accent);}
  .modal-actions{display:flex;gap:10px;margin-top:20px;}
  .btn-modal-ok{flex:1;padding:11px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}
  .btn-modal-cancel{padding:11px 16px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;}

  @media(max-width:900px){
    .container{grid-template-columns:1fr;padding:16px;}
    .config-panel{position:static;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">LP</div>
  <h1>Simulador de Préstamos</h1>
  <span>— tabla de amortización corregida</span>
</div>

<div class="container">
  <div>
    <div class="config-panel">
      <div class="panel-header">Configuración del Préstamo</div>
      <div class="form-body">
        <div class="field">
          <label>Nombre del Cliente</label>
          <input type="text" id="nombre" placeholder="Ej. Juan Pérez" />
        </div>
        <div class="field">
          <label>Monto del Préstamo (L)</label>
          <input type="number" id="capital" value="50000" min="1" step="100" />
        </div>
        <div class="field-row">
          <div class="field">
            <label>Tasa (%)</label>
            <input type="number" id="tasa" value="5" min="0" step="0.1" />
          </div>
          <div class="field">
            <label>Tipo</label>
            <select id="tipoTasa">
              <option value="mensual">Mensual</option>
              <option value="anual">Anual</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Plazo (cuotas)</label>
            <input type="number" id="plazo" value="12" min="1" />
          </div>
          <div class="field">
            <label>Frecuencia</label>
            <select id="frecuencia">
              <option value="mensual">Mensual</option>
              <option value="quincenal">Quincenal</option>
              <option value="semanal">Semanal</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Fecha de Solicitud</label>
          <input type="date" id="fechaInicio" />
        </div>
      </div>

      <div class="stats-grid" id="statsGrid" style="display:none">
        <div class="stat-card"><div class="stat-label">Valor Cuota</div><div class="stat-value" id="statCuota">—</div></div>
        <div class="stat-card"><div class="stat-label">Intereses</div><div class="stat-value" id="statInteres">—</div></div>
        <div class="stat-card"><div class="stat-label">Total Pagar</div><div class="stat-value" id="statTotal">—</div></div>
        <div class="stat-card accent"><div class="stat-label">Capital</div><div class="stat-value" id="statCapital">—</div></div>
      </div>

      <button class="btn-calcular" onclick="calcular()">⚡ Calcular Tabla de Pagos</button>
    </div>
  </div>

  <div class="table-panel">
    <div class="table-header">
      <div class="table-title">Tabla de Amortización</div>
      <div class="progress-bar-wrap" id="progressWrap" style="display:none">
        <div class="progress-bar-outer"><div class="progress-bar-inner" id="progressBar" style="width:0%"></div></div>
        <span id="progressText">0 pagados</span>
      </div>
    </div>
    <div class="table-wrap" id="tableWrap">
      <div class="empty-state">📋 Configura el préstamo y presiona calcular</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitulo">Aplicar Pago</h3>
    <div class="modal-sub" id="modalSub"></div>
    <div class="modal-resumen">
      <div class="modal-resumen-row"><span>Interés</span><span id="mResInteres"></span></div>
      <div class="modal-resumen-row"><span>Capital</span><span id="mResCap"></span></div>
      <div class="modal-resumen-row total"><span>Total cuota</span><span id="mResTotal"></span></div>
    </div>
    <div class="field" style="margin-bottom:12px">
      <label>Monto Recibido (L)</label>
      <input type="number" id="modalMonto" step="0.01" />
    </div>
    <div class="field">
      <label>Fecha de Pago</label>
      <input type="date" id="modalFecha" />
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-modal-ok" onclick="confirmarPago()">Confirmar</button>
    </div>
  </div>
</div>

<script>
  // Inicialización de fecha
  document.getElementById('fechaInicio').value = new Date().toISOString().split('T')[0];

  let cuotas = [];
  let idxPagoActivo = null;

  const fmtNum = n => n.toLocaleString('es-HN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtFecha = d => d.toLocaleDateString('es-HN', { day: '2-digit', month: 'short', year: 'numeric' });

  function calcular() {
    const capital = parseFloat(document.getElementById('capital').value);
    const tasa = parseFloat(document.getElementById('tasa').value) / 100;
    const tipoTasa = document.getElementById('tipoTasa').value;
    const plazo = parseInt(document.getElementById('plazo').value);
    const frecuencia = document.getElementById('frecuencia').value;
    const fechaInicioVal = document.getElementById('fechaInicio').value;

    if (!capital || isNaN(tasa) || !plazo || !fechaInicioVal) {
      alert('Completa los campos.'); return;
    }

    let tasaPeriodo;
    if (tipoTasa === 'anual') {
      tasaPeriodo = frecuencia === 'mensual' ? tasa / 12 : frecuencia === 'quincenal' ? tasa / 24 : tasa / 52;
    } else {
      tasaPeriodo = frecuencia === 'mensual' ? tasa : frecuencia === 'quincenal' ? tasa / 2 : tasa / 4.33;
    }

    const capitalCuota = capital / plazo;
    const interesCuota = capital * tasaPeriodo;
    const cuotaFija = capitalCuota + interesCuota;
    let fechaBase = new Date(fechaInicioVal + 'T00:00:00');

    cuotas = [];
    for (let i = 1; i <= plazo; i++) {
      let f = new Date(fechaBase);
      if (frecuencia === 'mensual') f.setMonth(f.getMonth() + i);
      else if (frecuencia === 'quincenal') f.setDate(f.getDate() + (15 * i));
      else f.setDate(f.getDate() + (7 * i));

      cuotas.push({
        num: i, fecha: f, capital: capitalCuota, interes: interesCuota, total: cuotaFija,
        pagada: false, montoPagado: null, fechaPago: null, abonoRecibido: 0,
        _capitalOrig: capitalCuota, _interesOrig: interesCuota
      });
    }

    document.getElementById('statCuota').textContent = 'L ' + fmtNum(cuotaFija);
    document.getElementById('statInteres').textContent = 'L ' + fmtNum(interesCuota * plazo);
    document.getElementById('statTotal').textContent = 'L ' + fmtNum(capital + (interesCuota * plazo));
    document.getElementById('statCapital').textContent = 'L ' + fmtNum(capital);
    document.getElementById('statsGrid').style.display = 'grid';
    document.getElementById('progressWrap').style.display = 'flex';

    renderTabla();
  }

  function renderTabla() {
    const pagadas = cuotas.filter(c => c.pagada).length;
    const pct = cuotas.length ? (pagadas / cuotas.length * 100) : 0;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${pagadas} / ${cuotas.length} pagados`;

    let html = `<table><thead><tr>
      <th>#</th><th>Fecha</th><th>Capital</th><th>Interés</th><th>Total</th><th>Pago</th><th>Balance</th><th class="actions-col">Acción</th>
    </tr></thead><tbody>`;

    cuotas.forEach((c, i) => {
      const balance = Math.max(0, c.total - c.abonoRecibido);
      const balanceHtml = balance < 0.01 ? `<span class="balance-cero">0.00</span>` : `<span class="balance-pendiente">${fmtNum(balance)}</span>`;
      
      const pagoInfo = c.fechaPago 
        ? `<div style="display:flex;flex-direction:column;align-items:flex-end">
            <span class="fecha-pago-cell">${c.fechaPago}</span>
            <span style="color:var(--accent);font-weight:600;font-size:11px">L ${fmtNum(c.montoPagado)}</span>
           </div>` 
        : '<span style="color:var(--text3)">—</span>';

      const accion = c.pagada 
        ? `<div style="display:flex;gap:6px;justify-content:center"><span class="badge-pagada">✓</span><button class="btn-reversar" onclick="reversarPago(${i})">↩</button></div>`
        : `<button class="btn-pagar" onclick="abrirModal(${i})">Pagar</button>`;

      html += `<tr class="${c.pagada ? 'paid' : ''}">
        <td><span class="cuota-num">${c.num}</span></td>
        <td class="fecha-cell">${fmtFecha(c.fecha)}</td>
        <td class="num">${fmtNum(c.capital)}</td>
        <td class="num">${fmtNum(c.interes)}</td>
        <td class="num" style="font-weight:600">${fmtNum(c.total)}</td>
        <td class="num">${pagoInfo}</td>
        <td class="num">${balanceHtml}</td>
        <td class="actions-col">${accion}</td>
      </tr>`;
    });

    html += `</tbody></table>`;
    document.getElementById('tableWrap').innerHTML = html;
  }

  function abrirModal(idx) {
    idxPagoActivo = idx;
    const c = cuotas[idx];
    document.getElementById('modalTitulo').textContent = 'Cuota #' + c.num;
    document.getElementById('mResInteres').textContent = 'L ' + fmtNum(c.interes);
    document.getElementById('mResCap').textContent = 'L ' + fmtNum(c.capital);
    document.getElementById('mResTotal').textContent = 'L ' + fmtNum(c.total);
    document.getElementById('modalMonto').value = c.total.toFixed(2);
    document.getElementById('modalFecha').value = new Date().toISOString().split('T')[0];
    document.getElementById('modalOverlay').classList.add('open');
  }

  function cerrarModal() { document.getElementById('modalOverlay').classList.remove('open'); }

  function confirmarPago() {
    const monto = parseFloat(document.getElementById('modalMonto').value);
    const fecha = document.getElementById('modalFecha').value;
    if (isNaN(monto) || monto <= 0) return;

    const c = cuotas[idxPagoActivo];
    c.montoPagado = monto;
    c.fechaPago = fecha;
    c.abonoRecibido = monto;
    c.pagada = monto >= (c.total - 0.01);
    
    cerrarModal();
    renderTabla();
  }

  function reversarPago(idx) {
    cuotas[idx].pagada = false;
    cuotas[idx].montoPagado = null;
    cuotas[idx].fechaPago = null;
    cuotas[idx].abonoRecibido = 0;
    renderTabla();
  }
</script>
</body>
</html>
